<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A6B"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>

  <!-- Icono -->
  <rect x="0" y="10" width="80" height="80" rx="18" fill="url(#bg)"/>
  <!-- Barras ascendentes -->
  <rect x="12" y="58" width="10" height="22" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="26" y="48" width="10" height="32" rx="2.5" fill="rgba(255,255,255,0.45)"/>
  <rect x="40" y="35" width="10" height="45" rx="2.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="54" y="22" width="10" height="58" rx="2.5" fill="#ffffff"/>
  <!-- Línea de tendencia -->
  <polyline points="17,60 31,50 45,37 59,24" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="59" cy="24" r="4.5" fill="#10B981"/>

  <!-- Wordmark -->
  <text x="96" y="58" font-family="Georgia, serif" font-weight="700" font-size="44" fill="#1B3A6B" letter-spacing="-1">Fisco</text>
  <text x="96" y="58" font-family="Georgia, serif" font-weight="700" font-size="44" fill="url(#grd)" letter-spacing="-1">
    <tspan x="269" y="58">IA</tspan>
  </text>
  <!-- Tagline -->
  <text x="97" y="78" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="13" fill="#64748B" letter-spacing="2.5">ASISTENTE CONTABLE CON IA</text>
</svg>
