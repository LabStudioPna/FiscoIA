<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--blue:#2563EB;--green:#10B981;--teal:#14B8A6;
  --purple:#8B5CF6;--amber:#F59E0B;
  --border:#E2E8F0;--text:#1E293B;--mid:#475569;--dim:#94A3B8;
  --heading:#1B3A6B;
  --bg-page:#fff;--surface:#fff;--surface-2:#F8FAFF;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
[data-theme="dark"]{
  --border:rgba(255,255,255,.12);--text:#E5E7EB;--mid:#9CA3AF;--dim:#6B7280;
  --heading:#F1F5F9;
  --bg-page:#0B0D12;--surface:#161A23;--surface-2:#12151D;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--text);background:var(--bg-page);transition:background .2s,color .2s}
#theme-toggle{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s;flex-shrink:0}
#theme-toggle:hover{border-color:var(--green)}
/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:3px solid var(--green);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon img{width:100%;height:100%;object-fit:contain}
.logo-name{font-family:var(--serif);font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--navy),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{font-size:14px;font-weight:500;color:var(--mid);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--navy)}
.nav-cta{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff!important;padding:10px 22px;border-radius:8px;font-weight:600;box-shadow:0 4px 16px rgba(16,185,129,.35);transition:all .2s!important}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.45)!important}
/* HERO */
.hero{background:linear-gradient(160deg,#EFF6FF 0%,#E0F8F5 40%,#FFF5F0 100%);padding:90px 32px 70px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(37,99,235,.15) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-60px;left:-60px;width:420px;height:420px;background:radial-gradient(circle,rgba(16,185,129,.15) 0%,transparent 70%);pointer-events:none}
.badge{display:inline-flex;align-items:center;gap:8px;background:white;border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;color:var(--green);margin-bottom:28px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:var(--serif);font-size:clamp(34px,5vw,62px);font-weight:800;color:var(--heading);line-height:1.15;margin-bottom:24px;max-width:780px;margin-left:auto;margin-right:auto}
.hero h1 span{background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:18px;color:var(--mid);max-width:540px;margin:0 auto 40px;line-height:1.7}
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:60px}
.btn-g{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;padding:15px 30px;border-radius:10px;font-size:16px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(16,185,129,.4);transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(16,185,129,.5)}
.btn-w{background:#fff;color:var(--navy);padding:15px 30px;border-radius:10px;font-size:16px;font-weight:600;text-decoration:none;border:2px solid var(--green);transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-w:hover{background:var(--green);color:#fff}
/* DEMO */
.demo{max-width:700px;margin:0 auto;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 24px 80px rgba(27,58,107,.15);overflow:hidden;text-align:left;position:relative;z-index:1}
.demo-bar{background:linear-gradient(135deg,var(--navy),var(--blue));padding:12px 18px;display:flex;align-items:center;gap:12px}
.dots{display:flex;gap:5px}
.dots span{width:10px;height:10px;border-radius:50%}
.dots span:nth-child(1){background:#FF5F57}
.dots span:nth-child(2){background:#FFBD2E}
.dots span:nth-child(3){background:#28CA41}
.demo-url{flex:1;background:rgba(255,255,255,.1);border-radius:6px;padding:5px 12px;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.7)}
.demo-chat{padding:20px;display:flex;flex-direction:column;gap:14px;background:#FAFBFF}
.dm{display:flex;gap:10px;align-items:flex-start}
.dm.u{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.dm.ai .av{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff}
.dm.u .av{background:var(--green);color:#fff}
.bbl{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:460px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.dm.u .bbl{background:var(--green);color:#fff;border-color:var(--green)}
.dtag{font-size:10px;font-family:var(--mono);color:var(--green);margin-bottom:5px;letter-spacing:1px;font-weight:600}
/* STATS */
.stats{background:linear-gradient(135deg,var(--navy),#1e4d8c);padding:60px 32px}
.stats-inner{max-width:860px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:36px;text-align:center}
.snum{font-family:var(--serif);font-size:44px;font-weight:800;color:#fff;display:block;line-height:1;margin-bottom:8px}
.snum span{color:var(--green)}
.slbl{font-size:13px;color:rgba(255,255,255,.6)}
/* NUEVO EN JULIO */
.highlight-section{background:linear-gradient(135deg,#FFF5E6,#FFE8D6);padding:70px 32px;text-align:center;position:relative;overflow:hidden}
.highlight-section::before{content:'';position:absolute;top:-60px;right:-60px;width:350px;height:350px;background:radial-gradient(circle,rgba(245,158,11,.2) 0%,transparent 70%);pointer-events:none}
.highlight-section::after{content:'';position:absolute;bottom:-40px;left:-40px;width:280px;height:280px;background:radial-gradient(circle,rgba(16,185,129,.12) 0%,transparent 70%);pointer-events:none}
.hl-badge{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;color:var(--amber);margin-bottom:28px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hl-title{font-family:var(--serif);font-size:clamp(28px,4vw,48px);font-weight:800;color:var(--heading);line-height:1.2;margin-bottom:16px;max-width:680px;margin-left:auto;margin-right:auto}
.hl-sub{font-size:16px;color:var(--mid);max-width:540px;margin:0 auto 32px;line-height:1.7}
.hl-cards{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.hl-card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:28px 20px;text-align:left;transition:all .3s;position:relative}
.hl-card:hover{border-color:var(--amber);box-shadow:0 12px 32px rgba(245,158,11,.15);transform:translateY(-4px)}
.hl-icon{font-size:32px;margin-bottom:12px}
.hl-cname{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--heading);margin-bottom:8px}
.hl-cdesc{font-size:13px;color:var(--mid);line-height:1.6}
/* FEATURES */
.features{padding:90px 32px;background:linear-gradient(to bottom,#fff 0%,#F0FDF8 100%)}
.slabel{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:14px}
.stitle{font-family:var(--serif);font-size:clamp(26px,3.5vw,40px);font-weight:800;color:var(--heading);margin-bottom:14px;line-height:1.2}
.ssub{font-size:16px;color:var(--mid);max-width:500px;line-height:1.7}
.fgrid{max-width:1080px;margin:56px auto 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:22px}
.fc{background:#fff;border:2px solid var(--border);border-radius:16px;padding:30px;transition:all .3s;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px}
.fc:nth-child(1)::before{background:linear-gradient(90deg,var(--green),var(--teal))}
.fc:nth-child(2)::before{background:linear-gradient(90deg,var(--blue),#6366F1)}
.fc:nth-child(3)::before{background:linear-gradient(90deg,var(--purple),var(--blue))}
.fc:nth-child(4)::before{background:linear-gradient(90deg,var(--amber),#F97316)}
.fc:hover{border-color:var(--green);box-shadow:0 10px 40px rgba(16,185,129,.15);transform:translateY(-4px)}
.ficon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px}
.fc:nth-child(1) .ficon{background:rgba(16,185,129,.12)}
.fc:nth-child(2) .ficon{background:rgba(37,99,235,.12)}
.fc:nth-child(3) .ficon{background:rgba(139,92,246,.12)}
.fc:nth-child(4) .ficon{background:rgba(245,158,11,.12)}
.ftitle{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--heading);margin-bottom:10px}
.fdesc{font-size:14px;color:var(--mid);line-height:1.7}
.flist{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.flist li{font-size:13px;color:var(--mid);display:flex;align-items:flex-start;gap:8px;list-style:none}
.flist li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}
/* HOW */
.how{background:linear-gradient(to bottom,#EFF6FF,#E8F5FF);padding:90px 32px}
.how-inner{max-width:860px;margin:0 auto}
.steps{margin-top:56px;display:flex;flex-direction:column;gap:0;position:relative}
.steps::before{content:'';position:absolute;left:27px;top:48px;bottom:48px;width:3px;background:linear-gradient(to bottom,var(--blue),var(--green))}
.step{display:flex;gap:28px;align-items:flex-start;padding:28px 0}
.stepn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-family:var(--serif);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;box-shadow:0 4px 16px rgba(37,99,235,.3)}
.stepc{padding-top:10px}
.stept{font-family:var(--serif);font-size:21px;font-weight:700;color:var(--heading);margin-bottom:8px}
.stepd{font-size:15px;color:var(--mid);line-height:1.7;max-width:540px}
.stag{display:inline-block;background:var(--green);color:#fff;font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;margin-top:10px}
/* PRICING */
.pricing{padding:90px 32px;background:linear-gradient(to bottom,#fff,#F8FAFF);text-align:center}
.pgrid{max-width:940px;margin:56px auto 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:22px;align-items:start}
.pc{background:#fff;border:2px solid var(--border);border-radius:20px;padding:36px 28px;text-align:left;position:relative;transition:all .2s}
.pc:hover{box-shadow:0 12px 40px rgba(0,0,0,.1)}
.pc.feat{background:linear-gradient(135deg,var(--navy),#1e4d8c);border-color:var(--navy);transform:scale(1.03);box-shadow:0 20px 60px rgba(27,58,107,.25)}
.pbadge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:4px 16px;border-radius:20px;white-space:nowrap;letter-spacing:1px}
.pname{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--heading);margin-bottom:10px}
.pc.feat .pname{color:#fff}
.pprice{font-family:var(--serif);font-size:42px;font-weight:800;color:var(--heading);margin-bottom:8px;line-height:1}
.pc.feat .pprice{color:#fff}
.pperiod{font-size:13px;color:var(--mid);margin-bottom:20px}
.pc.feat .pperiod{color:rgba(255,255,255,.7)}
.pitems{display:flex;flex-direction:column;gap:12px;margin-bottom:28px;min-height:150px}
.pi{font-size:13px;color:var(--mid);display:flex;align-items:flex-start;gap:8px}
.pc.feat .pi{color:#fff}
.pi::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}
.pbtn{display:block;text-align:center;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s}
.pbtn-o{background:var(--green);color:#fff;border:2px solid var(--green)}
.pbtn-o:hover{background:#fff;color:var(--green)}
.pbtn-f{background:#fff;color:var(--navy);border:2px solid #fff}
.pbtn-f:hover{background:var(--green);color:#fff;border-color:var(--green)}
/* TESTIMONIAL */
.testimonial{background:linear-gradient(135deg,#F0FDF8,#E0F8F5);padding:70px 32px;text-align:center}
.tquote{font-family:var(--serif);font-size:clamp(20px,3vw,28px);font-weight:700;color:var(--heading);max-width:700px;margin:0 auto 24px;line-height:1.6}
.tauthor{font-size:14px;color:var(--mid)}
.tauthor strong{color:var(--heading);font-weight:600}
/* FAQ */
.faq{padding:90px 32px;background:#fff}
.faq-inner{max-width:780px;margin:0 auto}
.faqlist{margin-top:40px;display:flex;flex-direction:column;gap:16px}
.faqitem{border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s}
.faqitem.open{border-color:var(--green);background:#F0FDF8}
.faqq{padding:20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;color:var(--heading);user-select:none;transition:color .2s}
.faqitem.open .faqq{color:var(--green)}
.faqico{font-weight:300;font-size:20px;transition:transform .2s}
.faqitem.open .faqico{transform:rotate(45deg)}
.faqa{padding:0 20px;max-height:0;overflow:hidden;transition:all .3s;color:var(--mid);font-size:14px;line-height:1.7}
.faqitem.open .faqa{padding:0 20px 20px;max-height:400px}
/* CTA */
.cta{background:linear-gradient(135deg,var(--navy),#1e4d8c);color:#fff;padding:70px 32px;text-align:center}
.cta h2{font-family:var(--serif);font-size:clamp(32px,4vw,48px);font-weight:800;margin-bottom:14px}
.cta p{font-size:16px;max-width:500px;margin:0 auto;opacity:.9}
/* CONTACTO */
.contact{padding:90px 32px;background:var(--surface-2);text-align:center}
.contact-inner{max-width:600px;margin:0 auto}
.cform{margin-top:40px;display:flex;flex-direction:column;gap:18px;text-align:left}
.cfield{display:flex;flex-direction:column;gap:8px}
.cfield label{font-size:13px;font-weight:600;color:var(--heading)}
.cfield input,.cfield textarea{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;font-family:var(--sans);color:var(--text);transition:border-color .2s}
.cfield input:focus,.cfield textarea:focus{outline:none;border-color:var(--green)}
.cfield textarea{resize:vertical;min-height:110px}
.cform-submit{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;border:none;padding:15px 30px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.cform-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.35)}
.cform-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.cform-status{font-size:14px;padding:12px 16px;border-radius:8px;text-align:center;display:none}
.cform-status.show{display:block}
.cform-status.ok{background:rgba(16,185,129,.12);color:var(--green)}
.cform-status.err{background:rgba(220,38,38,.1);color:#DC2626}
/* FOOTER */
footer{background:#0E0E12;color:#fff;padding:50px 32px;text-align:center;border-top:1px solid rgba(255,255,255,.1)}
.fbrand{font-family:var(--serif);font-size:24px;font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,#00C896,#4A9EFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fbrand em{font-style:normal;color:#00C896}
.fcopy{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px}
.fby{font-size:12px;color:rgba(255,255,255,.5)}
.fby a{color:#00C896;text-decoration:none;transition:color .2s}
.fby a:hover{color:#4A9EFF}
/* === MODO OSCURO — overrides por sección === */
[data-theme="dark"] nav{background:rgba(11,13,18,.92)}
[data-theme="dark"] .logo-name{background:linear-gradient(135deg,var(--heading),var(--blue));-webkit-background-clip:text;background-clip:text}
[data-theme="dark"] .nav-links a{color:var(--mid)}
[data-theme="dark"] .nav-links a:hover{color:var(--heading)}
[data-theme="dark"] .hero{background:linear-gradient(160deg,#0F1B2E 0%,#0D2420 40%,#241A14 100%)}
[data-theme="dark"] .badge{background:var(--surface);border-color:var(--border);box-shadow:none}
[data-theme="dark"] .btn-w{background:var(--surface);color:var(--heading);border-color:var(--green)}
[data-theme="dark"] .demo{background:var(--surface);border-color:var(--border);box-shadow:0 24px 80px rgba(0,0,0,.4)}
[data-theme="dark"] .demo-chat{background:var(--surface-2)}
[data-theme="dark"] .bbl{background:var(--surface);border-color:var(--border);color:var(--text);box-shadow:none}
[data-theme="dark"] .dm.u .bbl{background:var(--green);color:#fff}
[data-theme="dark"] .highlight-section{background:linear-gradient(135deg,#241A0E,#1F1712)}
[data-theme="dark"] .highlight-section::before{background:radial-gradient(circle,rgba(245,158,11,.12) 0%,transparent 70%)}
[data-theme="dark"] .hl-badge{background:var(--surface);border-color:var(--border);box-shadow:none}
[data-theme="dark"] .hl-card{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .hl-cdesc{color:var(--mid)}
[data-theme="dark"] .features{background:linear-gradient(to bottom,var(--bg-page) 0%,#0D1C17 100%)}
[data-theme="dark"] .ssub{color:var(--mid)}
[data-theme="dark"] .fc{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .fdesc,[data-theme="dark"] .flist li{color:var(--mid)}
[data-theme="dark"] .how{background:linear-gradient(to bottom,#0F1B2E,#0D1F2E)}
[data-theme="dark"] .stepd{color:var(--mid)}

/* HAMBURGER MENU */
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px}
.hamburger span{width:24px;height:2.5px;background:var(--navy);border-radius:2px;transition:all .3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(8px,8px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(7px,-7px)}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;bottom:0;background:white;border-bottom:3px solid var(--green);flex-direction:column;gap:0;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:150;overflow-y:auto}
.mobile-menu.active{display:flex}
.mobile-menu a{padding:12px 16px;color:var(--mid);text-decoration:none;font-weight:500;border-bottom:1px solid var(--border);transition:all .2s}
.mobile-menu a:hover{background:rgba(16,185,129,.1);color:var(--navy)}
.mobile-menu .nav-cta{margin:12px 16px;width:calc(100% - 32px);text-align:center;border:none}
